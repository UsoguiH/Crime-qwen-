name: athar

services:
  backend:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /data
      # Model pinned to Qwen3-VL-30B-A3B (instruct + thinking). This overrides
      # any MODEL_NAME_* in .env — switched from 235B per request; the 30B is
      # far cheaper/lighter and keeps a real thinking checkpoint.
      MODEL_NAME_FAST: qwen/qwen3-vl-30b-a3b-instruct
      MODEL_NAME_THINKING: qwen/qwen3-vl-30b-a3b-thinking
      # 12 concurrent calls: grounding/verify are many small non-thinking calls;
      # wall-clock scales ~1/concurrency (10 min -> ~4 min measured 2026-07-21)
      MODEL_MAX_CONCURRENCY: 12
      # hard per-call deadline: heavy thinking detects run ~170s legit; a slow
      # provider once served one call in 17.8 min -> cancel at 240s and retry
      MODEL_TIMEOUT_S: 240
    volumes:
      - athar-data:/data
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health',timeout=5).status==200 else 1)"]
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8090:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── optional: local inference (docker compose --profile gpu up) ──
  vllm:
    profiles: ["gpu"]
    image: vllm/vllm-openai:latest
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen3-VL-8B-Instruct}
      --max-model-len 32768
      --limit-mm-per-prompt.video 0
    volumes:
      - vllm-cache:/root/.cache/huggingface
    ports:
      - "127.0.0.1:8001:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── optional: PostgreSQL instead of SQLite (--profile postgres) ──
  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: athar
      POSTGRES_PASSWORD: athar
      POSTGRES_DB: athar
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athar"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  athar-data:
  vllm-cache:
  pg-data:
